spring.application.name=portfolio
# Load environment variables from .env file if it exists
spring.config.import=optional:file:./.env[.properties]
# PostgreSQL database configuration https://console.neon.tech/
spring.datasource.url=${PG_URL_DATABASE}
spring.datasource.username=${PG_USER}
spring.datasource.password=${PG_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.sql.init.mode=always
file.upload.dir=src/main/resources/static/img/projects
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/
spring.threads.virtual.enabled=true