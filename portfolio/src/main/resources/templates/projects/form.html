<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style-form-project.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Formulario de Proyecto</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <div class="admin-header">
                <h2 class="section-title">Formulario de Proyecto</h2>
                <p class="admin-copy">Organiza la información del proyecto con el mismo patrón de campos, ayudas y
                    acciones del resto del panel.</p>
            </div>

            <div class="admin-actions">
                <a class="admin-action-secondary" th:href="@{/projects}">Volver a Proyectos</a>
                <!-- Permite evitar problemas de manipulación del formulario utilizando token csrf -->
                <form class="inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="logout-link" type="submit">Cerrar Sesión</button>
                </form>
            </div>

            <form
                    class="contact-form admin-form project-form"
                    method="POST"
                    th:action="@{/projects/save}"
                    th:object="${projectDto}"
                    enctype="multipart/form-data"
            >

                <div class="field-group">
                    <label for="title">Título</label>
                    <input id="title" type="text" placeholder="Título" th:field="*{title}">
                </div>
                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-message"></div>

                <div class="field-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" placeholder="Descripción" th:field="*{description}" rows="6"></textarea>
                </div>
                <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-message"></div>

                <div class="field-group">
                    <label for="projectUrl">URL del Proyecto</label>
                    <input id="projectUrl" type="url" placeholder="URL del proyecto" th:field="*{projectUrl}">
                </div>
                <div th:if="${#fields.hasErrors('projectUrl')}" th:errors="*{projectUrl}" class="error-message"></div>

                <div class="file-field">
                    <label for="file">Imagen del Proyecto
                        <input type="file" name="file" id="file">
                    </label>
                    <p class="field-hint">Puedes cargar una imagen nueva sin modificar el resto de los datos del
                        proyecto.</p>
                </div>
                <div th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}" class="error-message"></div>

                <div class="field-group">
                    <label for="personalInfoId">ID Información Personal</label>
                    <input id="personalInfoId" type="number" placeholder="ID Información Personal"
                           th:field="*{personalInfoId}">
                </div>
                <div th:if="${#fields.hasErrors('personalInfoId')}" th:errors="*{personalInfoId}"
                     class="error-message"></div>

                <div class="form-actions">
                    <button type="submit">Guardar Proyecto</button>
                </div>
            </form>
        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
