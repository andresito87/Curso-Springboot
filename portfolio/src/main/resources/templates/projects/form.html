<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style-form-project.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Formulario de Proyecto</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <h2 class="section-title">Formulario de Proyecto</h2>

            <div class="admin-actions">
                <a class="admin-action" th:href="@{/projects}">Volver a Proyectos</a>
                <a class="logout-link" th:href="@{/logout}">Cerrar Sesión</a>
            </div>

            <form
                    class="contact-form project-form"
                    method="POST"
                    th:action="@{/projects/save}"
                    th:object="${projectDto}"
                    enctype="multipart/form-data"
            >

                <input type="text" placeholder="Título" th:field="*{title}">
                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-message"></div>

                <textarea placeholder="Descripción" th:field="*{description}" rows="6"></textarea>
                <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-message"></div>

                <input type="url" placeholder="URL del proyecto" th:field="*{projectUrl}">
                <div th:if="${#fields.hasErrors('projectUrl')}" th:errors="*{projectUrl}" class="error-message"></div>

                <div class="file-field">
                    <label for="file">Imagen del proyecto:
                        <input type="file" name="file" id="file">
                    </label>
                </div>
                <div th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}" class="error-message"></div>

                <input type="number" placeholder="ID Información Personal" th:field="*{personalInfoId}">
                <div th:if="${#fields.hasErrors('personalInfoId')}" th:errors="*{personalInfoId}" class="error-message"></div>

                <button type="submit">Guardar Proyecto</button>
            </form>
        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
