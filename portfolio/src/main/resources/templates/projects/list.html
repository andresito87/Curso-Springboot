<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style-list.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Lista de Proyectos</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <div class="admin-header">
                <h2 class="section-title">Proyectos guardados</h2>
                <p class="admin-copy">Visualiza los proyectos guardados con enlaces, imagen y acciones agrupadas de
                    forma coherente.</p>
            </div>

            <div class="admin-actions">
                <a class="admin-action" th:href="@{/projects/new}">Crear Nuevo Proyecto</a>
                <!-- Permite evitar problemas de manipulación del formulario utilizando token csrf -->
                <form class="inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="logout-link" type="submit">Cerrar Sesión</button>
                </form>
            </div>

            <div class="table-scroll">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Descripción</th>
                        <th>URL del proyecto</th>
                        <th>Imagen del proyecto</th>
                        <th>ID Información Personal</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="project : ${projects}">
                        <td th:text="${project.id}"></td>
                        <td th:text="${project.title}"></td>
                        <td th:text="${project.description}"></td>
                        <td><a th:href="${project.projectUrl}" th:text="${project.projectUrl}"></a></td>
                        <td><img th:src="@{${project.imageUrl}}" alt="Imagen del proyecto"></td>
                        <td th:text="${project.personalInfoId}"></td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{/projects/edit/{id}(id=${project.id})}" class="btn-edit">Editar</a>
                                <form class="inline-form" th:action="@{/projects/delete/{id}(id=${project.id})}"
                                      method="post">
                                    <button type="submit" class="btn-delete"
                                            onclick="return confirm('¿Estás seguro de que deseas eliminar este proyecto?');">
                                        Eliminar
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <p th:if="${projects == null or projects.isEmpty()}" class="no-data-message">No hay proyectos
                registrados.</p>
        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
