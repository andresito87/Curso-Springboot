<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educación</title>
</head>
<body>
<section id="education" th:fragment="educations" class="content-section">
    <h2 class="section-title">Mi educación</h2>
    <div class="education-timeline timeline-grid">
        <div class="timeline-item" th:each="education : ${educationsList}">
            <h3 th:text="${education.degree} + ' - ' + ${education.institution}"></h3>
            <p class="timeline-date" th:text="${education.startDate} + ' / ' + ${education.endDate}"></p>
            <p th:text="${education.description}"></p>
        </div>
    </div>
</section>
</body>
</html>
