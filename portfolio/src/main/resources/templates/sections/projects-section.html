<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Proyectos</title>
</head>
<body>
<section id="projects" th:fragment="projects">
    <h2>Mis proyectos</h2>
    <div class="projects-grid">
        <div class="project-card" th:each="project : ${projectsList}">
            <img th:src="@{${project.imageUrl}}" th:alt="${project.title} + ' Project Image'">
            <h3 th:text="${project.title}"></h3>
            <p th:text="${project.description}"></p>
            <a href="#" th:href="@{${project.projectUrl}}">Ver Proyecto</a>
        </div>
    </div>
</section>
</body>
</html>
