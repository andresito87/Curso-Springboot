<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Navbar</title>
</head>
<body>
<nav th:fragment="navbar" class="site-nav" aria-label="Navegación principal">
    <ul>
        <li><a href="/">Principal</a></li>
        <li><a href="#education">Educación</a></li>
        <li><a href="#skills">Habilidades</a></li>
        <li><a href="#experience">Experiencia</a></li>
        <li><a href="#projects">Proyectos</a></li>
        <li><a href="#contact">Contacto</a></li>
        <!-- isAnonymous y isAuthenticated son métodos de la librería que permite comprobar el estado de autenticación -->
        <li sec:authorize="isAnonymous()"><a th:href="@{/login}">Iniciar sesión</a></li>
        <li sec:authorize="isAuthenticated()">
            <form class="inline-form" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="logout-link" type="submit">Cerrar Sesión</button>
            </form>
        </li>
    </ul>
</nav>
</body>
</html>
