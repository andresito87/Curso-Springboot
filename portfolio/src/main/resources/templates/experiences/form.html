<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title th:text="${experienceDto.id == null ? 'Crear Experiencia' : 'Editar Experiencia'}">Formulario de
        Experiencia</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <div class="admin-header">
                <h2 class="section-title"
                    th:text="${experienceDto.id == null ? 'Crear Nueva Experiencia Laboral' : 'Editar Experiencia Laboral'}">
                    Formulario de Experiencia</h2>
                <p class="admin-copy">Mantén la experiencia laboral alineada con el mismo espaciado, jerarquía y
                    acciones del panel.</p>
            </div>

            <div class="admin-actions">
                <a class="admin-action-secondary" th:href="@{/experiences}">Volver a Experiencias</a>
                <!-- Permite evitar problemas de manipulación del formulario utilizando token csrf -->
                <form class="inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="logout-link" type="submit">Cerrar Sesión</button>
                </form>
            </div>

            <form class="contact-form admin-form" th:action="@{/experiences/save}" th:object="${experienceDto}"
                  method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="field-group">
                    <label for="jobTitle">Título del Puesto</label>
                    <input id="jobTitle" type="text" th:field="*{jobTitle}" placeholder="Título del Puesto" required>
                </div>
                <div th:if="${#fields.hasErrors('jobTitle')}" th:errors="*{jobTitle}" class="error-message"></div>

                <div class="field-group">
                    <label for="companyName">Nombre de la Compañía</label>
                    <input id="companyName" type="text" th:field="*{companyName}" placeholder="Nombre de la Compañía"
                           required>
                </div>
                <div th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}" class="error-message"></div>

                <div class="field-group">
                    <label for="startDate">Fecha de Inicio</label>
                    <input type="date" id="startDate" th:field="*{startDate}" required>
                </div>
                <div th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}" class="error-message"></div>

                <div class="field-group">
                    <label for="endDate">Fecha de Fin</label>
                    <p class="field-hint">Déjalo vacío si sigues trabajando en este puesto.</p>
                    <input type="date" id="endDate" th:field="*{endDate}">
                </div>
                <div th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}" class="error-message"></div>

                <div class="field-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" th:field="*{description}" placeholder="Descripción de la experiencia"
                              rows="5" required></textarea>
                </div>
                <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-message"></div>

                <div class="field-group">
                    <label for="personalInfoId">ID Información Personal</label>
                    <input id="personalInfoId" type="number" th:field="*{personalInfoId}"
                           placeholder="ID Información Personal" required>
                </div>
                <div th:if="${#fields.hasErrors('personalInfoId')}" th:errors="*{personalInfoId}"
                     class="error-message"></div>

                <div class="form-actions">
                    <button type="submit">Guardar Experiencia</button>
                </div>
            </form>
        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
