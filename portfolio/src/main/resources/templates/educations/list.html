<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style-list.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Lista de Educación</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <h2>Lista de Educación</h2>

            <div class="admin-actions">
                <a class="admin-action" th:href="@{/educations/new}">Crear Nueva Educación</a>
                <a class="logout-link" th:href="@{/logout}">Cerrar Sesión</a>
            </div>

            <div th:if="${message}" class="message-success">
                <p th:text="${message}"></p>
            </div>
            <div th:if="${error}" class="message-error">
                <p th:text="${error}"></p>
            </div>

            <div class="table-scroll">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Institución</th>
                    <th>Fecha Inicio</th>
                    <th>Fecha Fin</th>
                    <th>Descripción</th>
                    <th>ID Info Personal</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="edu : ${educations}">
                    <td th:text="${edu.id}"></td>
                    <td th:text="${edu.degree}"></td>
                    <td th:text="${edu.institution}"></td>
                    <td th:text="${#temporals.format(edu.startDate, 'dd-MM-yyyy')}"></td>
                    <td th:text="${edu.endDate != null ? #temporals.format(edu.endDate, 'dd-MM-yyyy') : 'Actual'}"></td>
                    <td th:text="${edu.description}"></td>
                    <td th:text="${edu.personalInfoId}"></td>
                    <td>
                        <div class="table-actions">
                            <a th:href="@{/educations/edit/{id}(id=${edu.id})}" class="btn-edit">Editar</a>
                            <form th:action="@{/educations/delete/{id}(id=${edu.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn-delete"
                                        onclick="return confirm('¿Estás seguro de que quieres eliminar esta entrada de educación?');">
                                    Eliminar
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>

            <p th:if="${educations == null or educations.isEmpty()}" class="no-data-message">No hay entradas de educación registradas.</p>

        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
