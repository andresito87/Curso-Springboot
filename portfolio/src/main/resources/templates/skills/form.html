<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Formulario de Habilidad</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <div class="admin-header">
                <h2 class="section-title"
                    th:text="${skillDto.id == null ? 'Crear Nueva Habilidad' : 'Editar Habilidad'}">Formulario de
                    Habilidades</h2>
                <p class="admin-copy">Ajustá habilidades con el mismo patrón visual de labels, espaciado y acciones del
                    panel.</p>
            </div>

            <div class="admin-actions">
                <a class="admin-action-secondary" th:href="@{/skills}">Volver a Habilidades</a>
                <!-- Permite evitar problemas de manipulación del formulario utilizando token csrf -->
                <form class="inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="logout-link" type="submit">Cerrar Sesión</button>
                </form>
            </div>

            <form class="contact-form admin-form" method="post" th:action="@{/skills/save}" th:object="${skillDto}">
                <input type="hidden" th:field="*{id}"/>

                <div class="field-group">
                    <label for="name">Nombre de la Habilidad</label>
                    <input id="name" type="text" placeholder="Nombre de la habilidad" th:field="*{name}" required>
                </div>
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message"></div>

                <div class="field-group">
                    <label for="levelPercentage">Porcentaje</label>
                    <input id="levelPercentage" type="number" placeholder="Porcentaje (0-100)"
                           th:field="*{levelPercentage}" required min="0" max="100">
                </div>
                <div th:if="${#fields.hasErrors('levelPercentage')}" th:errors="*{levelPercentage}"
                     class="error-message"></div>

                <div class="field-group">
                    <label for="iconClass">Clase del Ícono</label>
                    <input id="iconClass" type="text" placeholder="Clase del ícono (ej. fas fa-code)"
                           th:field="*{iconClass}" required>
                </div>
                <div th:if="${#fields.hasErrors('iconClass')}" th:errors="*{iconClass}" class="error-message"></div>

                <div class="field-group">
                    <label for="personalInfoId">ID Información Personal</label>
                    <input id="personalInfoId" type="number" placeholder="ID Información Personal"
                           th:field="*{personalInfoId}" required>
                </div>
                <div th:if="${#fields.hasErrors('personalInfoId')}" th:errors="*{personalInfoId}"
                     class="error-message"></div>

                <div class="form-actions">
                    <button type="submit">Guardar Habilidad</button>
                </div>
            </form>
        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
