<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Formulario de Habilidad</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <h2 th:text="${skillDto.id == null ? 'Crear Nueva Habilidad' : 'Editar Habilidad'}">Formulario de Habilidades</h2>

            <div class="admin-actions">
                <a class="admin-action" th:href="@{/skills}">Volver a Habilidades</a>
                <a class="logout-link" th:href="@{/logout}">Cerrar Sesión</a>
            </div>

            <form class="contact-form" method="post" th:action="@{/skills/save}" th:object="${skillDto}">
                <input type="hidden" th:field="*{id}"/>

                <input type="text" placeholder="Nombre de la habilidad" th:field="*{name}" required>
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message"></div>

                <input type="number" placeholder="Porcentaje (0-100)" th:field="*{levelPercentage}" required min="0" max="100">
                <div th:if="${#fields.hasErrors('levelPercentage')}" th:errors="*{levelPercentage}" class="error-message"></div>

                <input type="text" placeholder="Clase del ícono (ej. fas fa-code)" th:field="*{iconClass}" required>
                <div th:if="${#fields.hasErrors('iconClass')}" th:errors="*{iconClass}" class="error-message"></div>

                <input type="number" placeholder="ID Información Personal" th:field="*{personalInfoId}" required>
                <div th:if="${#fields.hasErrors('personalInfoId')}" th:errors="*{personalInfoId}" class="error-message"></div>

                <button type="submit">Guardar Habilidad</button>
            </form>
        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
