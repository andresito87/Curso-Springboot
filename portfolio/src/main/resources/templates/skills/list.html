<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style-list.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Lista de Habilidades</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <div class="admin-header">
                <h2 class="section-title">Lista de Habilidades</h2>
                <p class="admin-copy">Consulta el conjunto de habilidades con acciones compactas y estados vacíos
                    alineados con el resto de las listas.</p>
            </div>

            <div class="admin-actions">
                <a class="admin-action" th:href="@{/skills/new}">Crear Nueva Habilidad</a>
                <!-- Permite evitar problemas de manipulación del formulario utilizando token csrf -->
                <form class="inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="logout-link" type="submit">Cerrar Sesión</button>
                </form>
            </div>

            <div th:if="${successMessage}" class="message-success">
                <p th:text="${successMessage}"></p>
            </div>
            <div th:if="${errorMessage}" class="message-error">
                <p th:text="${errorMessage}"></p>
            </div>

            <div class="table-scroll">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Porcentaje</th>
                        <th>Clase Ícono</th>
                        <th>ID Info Personal</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="skill : ${skills}">
                        <td th:text="${skill.id}"></td>
                        <td th:text="${skill.name}"></td>
                        <td th:text="${skill.levelPercentage}"></td>
                        <td th:text="${skill.iconClass}"></td>
                        <td th:text="${skill.personalInfoId}"></td>
                        <td>
                            <div class="table-actions">
                                <a class="btn-edit" th:href="@{/skills/edit/{id}(id=${skill.id})}">Editar</a>
                                <form class="inline-form" method="post"
                                      th:action="@{/skills/delete/{id}(id=${skill.id})}">
                                    <button type="submit" class="btn-delete"
                                            onclick="return confirm('¿Estás seguro de que quieres eliminar esta habilidad?');">
                                        Eliminar
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <p th:if="${skills == null or skills.isEmpty()}" class="no-data-message">No hay habilidades registradas.</p>

        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
