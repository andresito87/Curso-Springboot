<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/style-list.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title>Lista de Habilidades</title>
</head>
<body class="portfolio-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <h2>Lista de Habilidades</h2>

            <div class="admin-actions">
                <a class="admin-action" th:href="@{/skills/new}">Crear Nueva Habilidad</a>
                <a class="logout-link" th:href="@{/logout}">Cerrar Sesión</a>
            </div>

            <div th:if="${successMessage}" class="message-success">
                <p th:text="${successMessage}"></p>
            </div>
            <div th:if="${errorMessage}" class="message-error">
                <p th:text="${errorMessage}"></p>
            </div>

            <div class="table-scroll">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Porcentaje</th>
                    <th>Clase Ícono</th>
                    <th>ID Info Personal</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="skill : ${skills}">
                    <td th:text="${skill.id}"></td>
                    <td th:text="${skill.name}"></td>
                    <td th:text="${skill.levelPercentage}"></td>
                    <td th:text="${skill.iconClass}"></td>
                    <td th:text="${skill.personalInfoId}"></td>
                    <td>
                        <div class="table-actions">
                            <a class="btn-edit" th:href="@{/skills/edit/{id}(id=${skill.id})}">Editar</a>
                            <form method="post" style="display:inline;" th:action="@{/skills/delete/{id}(id=${skill.id})}">
                                <button type="submit" class="btn-delete"
                                        onclick="return confirm('¿Estás seguro de que quieres eliminar esta habilidad?');">
                                    Eliminar
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>

            <p th:if="${skills == null or skills.isEmpty()}" class="no-data-message">No hay habilidades registradas.</p>

        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
