<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/logos/springboot.png">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/form-style.css">
    <title th:text="${personalInfoDto.id == null ? 'Crear Información Personal' : 'Editar Información Personal'}">
        Formulario de Información Personal</title>
</head>
<body class="portfolio-page personalinfo-form-page">

<header class="site-header">
    <div class="header-container">
        <th:block th:replace="~{fragments/navbar-admin :: navbar-admin}"></th:block>
    </div>
</header>

<main class="portfolio-main">
    <div class="container page-shell">
        <section class="admin-section panel-section">
            <div class="admin-header personalinfo-form-header">
                <h2 class="section-title"
                    th:text="${personalInfoDto.id == null ? 'Crear Información Personal' : 'Editar Información Personal'}">
                    Formulario de Información Personal</h2>
                <p class="admin-copy">Centraliza los datos base del portfolio en un formulario con acciones y campos
                    coherentes.</p>
            </div>

            <div class="admin-actions personalinfo-form-actions">
                <a class="admin-action" th:href="@{/personal-info/create}">Crear Nuevo Portfolio</a>
                <a class="admin-action-secondary" th:href="@{/}">Ver Portfolio Público</a>
                <!-- Permite evitar problemas de manipulación del formulario utilizando token csrf -->
                <form class="inline-form" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="logout-link" type="submit">Cerrar Sesión</button>
                </form>
            </div>

            <div th:if="${message}" class="message-success">
                <p th:text="${message}"></p>
            </div>
            <div th:if="${error}" class="message-error">
                <p th:text="${error}"></p>
            </div>

            <form class="contact-form admin-form" th:action="@{/personal-info/save}" th:object="${personalInfoDto}"
                  method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="field-group">
                    <label for="firstName">Nombre</label>
                    <input id="firstName" type="text" th:field="*{firstName}" placeholder="Nombre" required>
                </div>
                <div th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error-message"></div>

                <div class="field-group">
                    <label for="lastName">Apellido</label>
                    <input id="lastName" type="text" th:field="*{lastName}" placeholder="Apellido" required>
                </div>
                <div th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error-message"></div>

                <div class="field-group">
                    <label for="title">Título Profesional</label>
                    <input id="title" type="text" th:field="*{title}" placeholder="Título (ej. Full Stack Developer)"
                           required>
                </div>
                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-message"></div>

                <div class="field-group">
                    <label for="profileDescription">Descripción del Perfil</label>
                    <textarea id="profileDescription" th:field="*{profileDescription}"
                              placeholder="Descripción de tu perfil (quién soy)" rows="8" required></textarea>
                </div>
                <div th:if="${#fields.hasErrors('profileDescription')}" th:errors="*{profileDescription}"
                     class="error-message"></div>

                <div class="field-group">
                    <label for="profileImageUrl">URL de la Imagen de Perfil</label>
                    <input id="profileImageUrl" type="text" th:field="*{profileImageUrl}"
                           placeholder="URL de la imagen de perfil" required>
                </div>
                <div th:if="${#fields.hasErrors('profileImageUrl')}" th:errors="*{profileImageUrl}"
                     class="error-message"></div>

                <div class="field-group">
                    <label for="yearsOfExperience">Años de Experiencia</label>
                    <input id="yearsOfExperience" type="number" th:field="*{yearsOfExperience}"
                           placeholder="Años de experiencia" min="0" required>
                </div>
                <div th:if="${#fields.hasErrors('yearsOfExperience')}" th:errors="*{yearsOfExperience}"
                     class="error-message"></div>

                <div class="field-group">
                    <label for="email">Email de Contacto</label>
                    <input id="email" type="email" th:field="*{email}" placeholder="Email de contacto" required>
                </div>
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></div>

                <div class="field-group">
                    <label for="phone">Número de Teléfono</label>
                    <input id="phone" type="tel" th:field="*{phone}" placeholder="Número de teléfono" required>
                </div>
                <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="error-message"></div>

                <div class="field-group">
                    <label for="linkedinUrl">URL de LinkedIn</label>
                    <input id="linkedinUrl" type="url" th:field="*{linkedinUrl}" placeholder="URL de LinkedIn" required>
                </div>
                <div th:if="${#fields.hasErrors('linkedinUrl')}" th:errors="*{linkedinUrl}" class="error-message"></div>

                <div class="field-group">
                    <label for="githubUrl">URL de GitHub</label>
                    <input id="githubUrl" type="url" th:field="*{githubUrl}" placeholder="URL de GitHub" required>
                </div>
                <div th:if="${#fields.hasErrors('githubUrl')}" th:errors="*{githubUrl}" class="error-message"></div>

                <div class="form-actions personalinfo-form-submit">
                    <button type="submit">Guardar Información Personal</button>
                </div>
            </form>
        </section>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
