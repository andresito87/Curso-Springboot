spring.application.name=events-api
# Allows to see the SQL statements generated by Hibernate in the console. Useful for debugging and understanding the queries being executed.
spring.jpa.show-sql=true
# update: allows to hibernate to automatically create and update the database schema based on the entity classes. Useful during development.
# create: creates the database schema on application startup, destroying previous data. Useful for testing.
# validate: validates the database schema against the entity classes, throwing an error if there are discrepancies. Useful for production.
# none: disables automatic schema management and validation, requiring manual database management. Useful for production.
spring.jpa.hibernate.ddl-auto=update